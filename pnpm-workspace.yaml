packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

catalog:
  "@eslint/js": ^9.38.0
  "@tailwindcss/postcss": ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  "@types/node": ^24.1.0
  eslint: ^10.4.0
  prettier: ^3.8.3
  tailwindcss: ^4.3.0
  typescript: 6.0.3
  zod: ^4.4.3

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
